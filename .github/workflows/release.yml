name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ─── Quality gate (lint + type-check) ─────────────────────
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      - name: Lint
        working-directory: front-end
        run: npm run lint

      - name: TypeScript check
        working-directory: front-end
        run: npx tsc -b --noEmit

  # ─── Semantic Release (version + tag + changelog) ─────────
  semantic-release:
    name: Semantic Release
    needs: quality-gate
    runs-on: ubuntu-latest
    outputs:
      new-release: ${{ steps.release.outputs.new-release }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      - name: Debug git info
        working-directory: front-end
        run: |
          echo "Branch: $(git branch --show-current)"
          echo "Remote: $(git remote get-url origin)"
          echo "Last 5 commits:"
          git log --oneline -5

      - name: Run semantic-release
        id: release
        working-directory: front-end
        run: |
          SR_EXIT=0
          npx semantic-release --debug 2>&1 | tee sr-output.txt || SR_EXIT=$?

          # Check version file written by @semantic-release/exec successCmd
          if [ -f .release-version ]; then
            VERSION=$(cat .release-version | tr -d '[:space:]')
            echo "new-release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "🎉 Released v$VERSION"
          else
            echo "new-release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            if [ $SR_EXIT -ne 0 ]; then
              echo "❌ semantic-release failed with exit code $SR_EXIT"
              echo "--- Output ---"
              cat sr-output.txt
              exit 1
            else
              echo "ℹ️ No new release"
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Build desktop apps (parallel across OS) ──────────────
  build-desktop:
    name: Build ${{ matrix.platform }}
    needs: semantic-release
    if: needs.semantic-release.outputs.new-release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            electron-args: --win --x64
            artifact-name: release-windows
            backend-script: powershell -ExecutionPolicy Bypass -File build_backend.ps1
          - os: macos-latest
            platform: macOS
            electron-args: --mac --arm64
            artifact-name: release-macos
            backend-script: bash build_backend.sh
          - os: ubuntu-latest
            platform: Linux
            electron-args: --linux --x64
            artifact-name: release-linux
            backend-script: bash build_backend.sh

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      # ── Python (for PyInstaller backend build) ─────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: back-end
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend executable
        working-directory: back-end
        run: ${{ matrix.backend-script }}

      - name: Verify backend artifact
        shell: bash
        run: |
          echo "📦 Backend contents:"
          ls -la front-end/backend/ | head -20
          if [ "${{ matrix.platform }}" = "Windows" ]; then
            test -f front-end/backend/WebQuizBackend.exe || { echo "❌ WebQuizBackend.exe not found"; exit 1; }
          else
            test -f front-end/backend/WebQuizBackend || { echo "❌ WebQuizBackend not found"; exit 1; }
          fi
          echo "✅ Backend build verified"

      # ── Node.js (for Electron build) ───────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      - name: Sync package version
        working-directory: front-end
        run: npm version ${{ needs.semantic-release.outputs.version }} --no-git-tag-version --allow-same-version
        shell: bash

      - name: Build React (Vite)
        working-directory: front-end
        run: npm run build

      - name: Transpile Electron
        working-directory: front-end
        run: npm run transpile:electron

      - name: Build Electron app
        working-directory: front-end
        run: npx electron-builder ${{ matrix.electron-args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        shell: bash
        run: |
          echo "📦 Electron build output:"
          ls -la front-end/dist/ || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            front-end/dist/*.zip
            front-end/dist/*.exe
            front-end/dist/*.dmg
            front-end/dist/*.AppImage
            front-end/dist/*.deb
            front-end/dist/*.rpm
          if-no-files-found: warn
          retention-days: 5

  # ─── Upload assets to the GitHub Release ──────────────────
  upload-assets:
    name: Upload release assets
    needs: [semantic-release, build-desktop]
    if: needs.semantic-release.outputs.new-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: List release assets
        run: |
          echo "📦 Release assets:"
          find artifacts -type f | head -50

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.semantic-release.outputs.version }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
